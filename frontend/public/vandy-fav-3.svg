<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Định nghĩa các vùng màu loang (Aurora Style) -->
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" /> <!-- Mộc (Xanh) -->
      <stop offset="40%" style="stop-color:#e67e22;stop-opacity:1" /> <!-- Hỏa (Cam) -->
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" /> <!-- Hỏa (Đỏ) -->
    </linearGradient>
    
    <!-- Tạo hiệu ứng lớp phủ để màu sắc trông mềm hơn -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
  </defs>

  <!-- Nền bo tròn góc (Squircle) thay vì hình tròn đơn điệu - Xu hướng UI hiện đại -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#auroraGrad)" />

  <!-- Thêm một lớp màu xanh loang nhẹ ở góc để tạo độ sâu -->
  <circle cx="100" cy="400" r="150" fill="#27ae60" filter="url(#softGlow)" opacity="0.6" />

  <!-- Chi tiết nhận diện màu trắng tinh tế -->
  <g fill="white">
    <!-- Chữ Vandy cách điệu -->
    <path d="M120 220 C100 180, 180 150, 210 200 L240 320 L270 200 C300 150, 380 180, 360 220 L330 310 Q310 340, 240 340 Q170 340, 150 310 Z" />
    <!-- Đôi cánh -->
    <path d="M140 210 Q90 150, 60 230 Q90 210, 130 240 Z" />
    <path d="M372 210 Q422 150, 452 230 Q422 210, 382 240 Z" />
  </g>

  <!-- Nụ cười -->
  <path d="M180 370 Q256 420, 332 370" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" />
</svg>
